{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 space-y-6">

  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <nav aria-label="breadcrumb">
      <ol class="flex items-center space-x-2 text-sm font-medium">
        <li>
          <a href="{% url 'income' %}" class="text-indigo-400 hover:text-indigo-600 transition-colors">Income</a>
        </li>
        <li class="flex items-center text-slate-400">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
          <span class="ml-2 text-slate-800 font-bold">Add Income</span>
        </li>
      </ol>
    </nav>

    <a href="{% url 'income' %}" class="inline-flex items-center justify-center px-4 py-2 bg-white border border-indigo-200 text-indigo-600 text-xs font-bold rounded-xl hover:bg-indigo-50 shadow-sm transition-all hover:-translate-y-0.5">
      <svg class="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      Back to List
    </a>
  </div>

  {% include 'partials/_messages.html' %}

  <!-- Form Card -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">

    <!-- Card Header -->
    <div class="bg-gradient-to-r from-indigo-600 to-violet-600 px-8 py-5">
      <h2 class="text-white font-bold text-lg tracking-tight">Add New Income</h2>
      <p class="text-indigo-200 text-xs mt-1">Fill in the details to record a new income entry.</p>
    </div>

    <div class="p-6 md:p-8">
      <form action="{% url 'add-income' %}" method="post" class="space-y-6">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- Amount -->
          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Amount</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-emerald-500 font-bold text-sm pointer-events-none">$</span>
              <input
                type="number"
                step="0.01"
                name="amount"
                value="{{values.amount}}"
                placeholder="0.00"
                class="block w-full pl-7 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm text-slate-900 outline-none transition-all"
                required
              />
            </div>
          </div>

          <!-- Date -->
          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Date of Income</label>
            <input
              type="date"
              name="income_date"
              class="block w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm text-slate-900 outline-none transition-all"
              required
            />
          </div>
        </div>

        <!-- Source -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Source</label>
          <div class="relative">
            <select
              name="source"
              class="block w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm text-slate-900 outline-none transition-all appearance-none cursor-pointer"
            >
              <option value="" disabled selected>Select income source</option>
              {% for source in sources %}
                <option value="{{source.name}}">{{source.name}}</option>
              {% endfor %}
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-indigo-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>

        <!-- Description -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider">Description</label>
          <textarea
            name="description"
            rows="3"
            placeholder="Notes on this income..."
            class="block w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm text-slate-900 outline-none transition-all resize-none"
            required
          >{{values.description}}</textarea>
        </div>

        <!-- Actions -->
        <div class="pt-4 flex items-center justify-end gap-3 border-t border-slate-100">
          <a href="{% url 'income' %}" class="px-5 py-2 text-xs font-bold text-slate-500 hover:text-slate-700 border border-slate-200 rounded-xl hover:bg-slate-50 transition-all">
            Cancel
          </a>
          <button
            type="submit"
            class="px-8 py-2.5 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white text-xs font-bold rounded-xl shadow-md shadow-indigo-200 transition-all hover:-translate-y-0.5 active:scale-95"
          >
            Submit Income
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
{% endblock %}
