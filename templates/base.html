{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KilyuExpenses | {% block title %}{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="{% static 'css/style.css' %}" rel="stylesheet" />
    
    <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.28.0/dist/feather.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>

    <style>
        /* Ensuring the content doesn't get hidden behind the fixed sidebar */
        .main-content { margin-left: 16rem; } 
        @media (max-width: 768px) { .main-content { margin-left: 0; } }
    </style>
</head>

<body class="h-full font-sans text-slate-900">

    <header class="fixed top-0 z-50 w-full bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4 h-16 shadow-md">
        <div class="flex items-center gap-4">
            <button class="md:hidden text-slate-400 hover:text-white" type="button" onclick="toggleSidebar()">
                <span data-feather="menu"></span>
            </button>
            <a class="text-xl font-bold text-white tracking-tight" href="#">
                Kilyu<span class="text-indigo-500">Expenses</span>
            </a>
        </div>

        <div class="flex items-center gap-6">
            <span class="hidden sm:block text-sm font-medium text-slate-400">
                <span class="text-slate-500">User:</span> {{request.user.username}}
            </span>

            <form action="{% url 'logout' %}" method="POST" class="m-0">
                {% csrf_token %}
                <button type="submit" class="bg-slate-800 hover:bg-red-600 text-white text-xs uppercase tracking-widest font-bold py-2 px-4 rounded-lg transition-all duration-200">
                    Sign out
                </button>
            </form>
        </div>
    </header>

    <div class="flex pt-16 h-screen">
        <aside class="hidden md:block w-64 fixed inset-y-0 left-0 pt-16 z-40">
            {% include 'partials/sidebar.html' %}
        </aside>

        <main class="main-content flex-1 p-6 lg:p-10 overflow-y-auto bg-slate-50">
            <div class="max-w-7xl mx-auto">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <script>
        // Initialize Feather Icons
        feather.replace();

        // Simple Mobile Sidebar Toggle logic (Optional)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebarMenu');
            sidebar.classList.toggle('-translate-x-full');
        }
    </script>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
