{% extends 'partials/base_auth.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-md border border-gray-100">
    
    <div class="text-center">
      <h2 class="text-2xl font-extrabold text-gray-900">
        Reset your password
      </h2>
      <p class="mt-2 text-sm text-gray-600">
        Enter your email to get a reset link
      </p>
    </div>

    <form action="{% url 'request-password' %}" method="post" class="mt-8 space-y-6">
      {% csrf_token %}
      {% include 'partials/_messages.html' %}
      
      <div class="rounded-md shadow-sm">
        <div>
          <input
            type="email"
            name="email"
            id="emailField"
            value="{{values.email}}"
            placeholder="Email Address"
            required
            class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
          />
        </div>
      </div>

      <div>
        <button type="submit" class="submit-btn group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out">
          Send Reset Link
        </button>
      </div>
    </form>

    <div class="text-center mt-6 space-y-2">
      <p class="text-sm text-gray-600">
        Remembered your password? 
        <a href="{% url 'login' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Login</a>
      </p>
      <p class="text-sm text-gray-600">
        Don't have an account? 
        <a href="{% url 'register' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Sign up</a>
      </p>
    </div>

  </div>
</div>

<script src="{% static 'js/reg.js' %}"></script>
{% endblock %}
