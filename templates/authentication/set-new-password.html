{% extends 'partials/base_auth.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-md border border-gray-100">
    
    <div class="text-center">
      <h2 class="text-2xl font-extrabold text-gray-900">
        Create new password
      </h2>
      <p class="mt-2 text-sm text-gray-600">
        Please enter your new password below
      </p>
    </div>

    <form action="{% url 'reset-user-password' uidb64 token %}" method="post" class="mt-8 space-y-4">
      {% csrf_token %}
      {% include 'partials/_messages.html' %}
      
      <div class="relative">
        <input
          type="password"
          name="password"
          id="passwordField"
          placeholder="New Password"
          required
          class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
        />
        <small class="ShowPassword absolute inset-y-0 right-0 pr-3 flex items-center text-xs font-bold cursor-pointer text-indigo-600 hover:text-indigo-500 uppercase">
          Show
        </small>
      </div>

      <div class="relative">
        <input
          type="password"
          name="password2"
          id="passwordField2"
          placeholder="Confirm Password"
          required
          class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
        />
        <small class="ShowPassword absolute inset-y-0 right-0 pr-3 flex items-center text-xs font-bold cursor-pointer text-indigo-600 hover:text-indigo-500 uppercase">
          Show
        </small>
      </div>

      <div class="invalid_feedback text-red-500 text-xs" style="display:none"></div>

      <div class="pt-2">
        <button type="submit" class="submit-btn w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out">
          Submit New Password
        </button>
      </div>
    </form>

    <div class="text-center mt-6 space-y-2">
      <p class="text-sm text-gray-600">
        Remembered it? 
        <a href="{% url 'login' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Login</a>
      </p>
      <p class="text-sm text-gray-600">
        No account? 
        <a href="{% url 'register' %}" class="font-medium text-indigo-600 hover:text-indigo-500">Register here</a>
      </p>
    </div>

  </div>
</div>

<script src="{% static 'js/reg.js' %}"></script>
{% endblock %}
